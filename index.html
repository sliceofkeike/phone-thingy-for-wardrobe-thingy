<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Messages</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        /* Blends the embed canvas seamlessly into Notion */
        body {
            background-color: transparent;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* The Phone Container (sized to the image aspect ratio) */
        .phone-container {
            width: 320px;
            height: 654px;
            position: relative;
            background-image: url('https://i.imgur.com/vHqLh7R.png'); /* Sized to fit *within* the phone shell */
            background-size: 100% 100%;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            cursor: pointer;
        }

        /* --- THE STATUS BAR (Live Time) --- */
        .status-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            height: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: black;
            font-size: 13px;
            font-weight: 600;
            user-select: none;
        }

        .left-icons {
            display: flex;
            align-items: center;
        }

        .right-icons {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Minimal Signal (4 balls), Wi-Fi, 50% Battery Icons */
        .battery {
            width: 20px;
            height: 10px;
            border: 1.5px solid black;
            border-radius: 3px;
            position: relative;
            margin-left: 2px;
        }
        .battery::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 50%;
            background-color: black;
            border-radius: 1.5px;
        }
        .battery::after {
            content: '';
            position: absolute;
            right: -3px; top: 2px;
            width: 2px; height: 5px;
            background-color: black;
            border-radius: 0 1.5px 1.5px 0;
        }

        /* --- THE CHAT HEADER (Unread Messages/User/FaceTime) ---http://googleusercontent.com/image_generation_content/1
