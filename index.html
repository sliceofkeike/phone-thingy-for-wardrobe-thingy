<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floating Text Stream</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        /* Transparent canvas allows the bubbles to float cleanly on Notion */
        html, body {
            background-color: transparent;
            margin: 0;
            padding: 10px;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* The container holding only the text stream */
        .chat-stream-container {
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* --- TEXT BUBBLE DESIGN --- */
        .bubble {
            max-width: 80%;
            padding: 10px 14px;
            font-size: 14px;
            line-height: 1.4;
            border-radius: 18px;
            opacity: 0;
            transform: translateY(20px);
            display: none;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.05);
            word-wrap: break-word;
        }

        /* Pastel Blue for Sender (Bestie) */
        .bubble.incoming {
            background-color: #BCE2FA;
            color: #ffffff;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            text-shadow: 0 1px 2px rgba(140, 190, 220, 0.4);
        }

        /* Pastel Pink for Recipient (You) */
        .bubble.outgoing {
            background-color: #F5D1DC;
            color: #ffffff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            text-shadow: 0 1px 2px rgba(220, 160, 180, 0.4);
        }

        /* GIF bubble styling */
        .bubble.gif-container {
            background: transparent;
            padding: 0;
            box-shadow: none;
            border-radius: 14px;
            overflow: hidden;
            align-self: flex-start;
        }
        .bubble.gif-container img {
            width: 160px;
            border-radius: 14px;
            display: block;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
        }

        /* Active show animation trigger */
        .bubble.show {
            display: block;
            animation: popIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* --- FINALE POPUP --- */
        .popup-modal {
            align-self: center;
            background: rgba(255, 255, 255, 0.95);
            border: 1.5px double #F5D1DC;
            border-radius: 16px;
            padding: 12px 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(245, 209, 220, 0.25);
            opacity: 0;
            transform: translateY(10px);
            display: none;
            margin-top: 10px;
        }
        .popup-modal.reveal {
            display: block;
            animation: popIn 0.4s ease forwards;
        }
        .popup-title {
            font-size: 13px;
            font-weight: 500;
            color: #F5D1DC;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }
        .popup-arrow {
            font-size: 16px;
            color: #BCE2FA;
            animation: bounce 1.2s infinite;
        }

        /* --- CORE STAGE KEYFRAMES --- */
        @keyframes popIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(4px); }
        }
    </style>
</head>
<body>

    <div class="chat-stream-container" id="chatStream" onclick="advanceChatChain()">
        
        <div class="bubble incoming" id="msg1">omg girl i just saw your post</div>
        <div class="bubble incoming" id="msg2">you need to send me outfit details, now!!</div>
        <div class="bubble outgoing" id="msg3">loll i will, i will dw!</div>
        <div class="bubble incoming" id="msg4">girl you better, the people want to know</div>
        <div class="bubble incoming" id="msg5">and you better not gatekeep istg...</div>
        
        <div class="bubble gif-container" id="msg6">
            <img src="https://media.giphy.com/media/d4AyIXQh2nlfVVWsrJ/giphy.gif" alt="waving gif">
        </div>
        
        <div class="bubble outgoing" id="msg7">LOL I WONT</div>
        <div class="bubble incoming" id="msg8">hurry up and send the details lmao</div>

        <div class="popup-modal" id="detailsPopup">
            <div class="popup-title">are you gonna send the details?</div>
            <div class="popup-arrow">↓</div>
        </div>

    </div>

    <script>
        let currentStep = 0;
        const chatStream = document.getElementById('chatStream');
        const popup = document.getElementById('detailsPopup');

        function advanceChatChain() {
            currentStep++;

            if (currentStep === 1) {
                showBubble('msg1');
            } 
            else if (currentStep === 2) {
                showBubble('msg2');
            } 
            else if (currentStep === 3) {
                showBubble('msg3'); // Instant appearance without keyboard lag
            } 
            else if (currentStep === 4) {
                showBubble('msg4');
            } 
            else if (currentStep === 5) {
                showBubble('msg5');
            } 
            else if (currentStep === 6) {
                showBubble('msg6'); // Inject GIF
            } 
            else if (currentStep === 7) {
                showBubble('msg7');
            } 
            else if (currentStep === 8) {
                showBubble('msg8');
            } 
            else if (currentStep === 9) {
                popup.classList.add('reveal');
                setTimeout(scrollToBottom, 50);
            }
        }

        function showBubble(id) {
            const element = document.getElementById(id);
            element.classList.add('show');
            scrollToBottom();
        }

        // Keeps shifting the container layout beautifully so everything fits comfortably 
        function scrollToBottom() {
            const activeElements = document.querySelectorAll('.bubble.show');
            if (activeElements.length > 3) {
                const shiftValue = (activeElements.length - 3) * -45;
                // Shifts view stream up slightly as new text loads
                chatStream.style.transform = `translateY(${shiftValue}px)`;
            }
        }
    </script>

</body>
</html>
